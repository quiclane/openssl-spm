name: openssl-stable-once
# Manually cut a locked stable tag (url-based, frozen forever). A cut tag's
# url+checksum never change and its release is never auto-deleted.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Stable semver tag to cut (e.g. 1.0.0)"
        required: true
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Build from tracked upstream
        run: |
          set -euo pipefail
          CFG=ci/openssl-upstream.txt
          REPO="$(awk -F= '/^repo=/{print $2}' "$CFG" | tail -1)";   [ -n "$REPO" ]   || REPO="https://github.com/openssl/openssl.git"
          BRANCH="$(awk -F= '/^branch=/{print $2}' "$CFG" | tail -1)"; [ -n "$BRANCH" ] || BRANCH="openssl-3.6"
          tmp="$(mktemp -d)"; git clone --depth 1 --branch "$BRANCH" "$REPO" "$tmp/src"
          OPENSSL_SRC="$tmp/src" bash ci/build-openssl-apple.sh
      - name: Write url-based Package.swift, tag, frozen release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          V="${{ github.event.inputs.version }}"
          SUM="$(swift package compute-checksum OpenSSL.xcframework.zip)"
          bash ci/write-package-swift.sh "$V" "$SUM"
          git config user.name  "quiclane"
          git config user.email "quiclane@users.noreply.github.com"
          git add Package.swift
          git commit -q -m "stable $V (OpenSSL, url-based)"
          git tag -f "$V"
          git push origin HEAD:main
          git push -f origin "$V"
          gh release delete "$V" -y 2>/dev/null || true
          gh release create "$V" OpenSSL.xcframework.zip \
            --title "OpenSSL (stable, frozen) $V" \
            --notes "Frozen stable — never auto-deleted. Pin: exact \"$V\"."
