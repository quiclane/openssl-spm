name: openssl-stable-once
# Manually cut a NEW locked stable tag. Stable is intentionally rare and NEVER
# auto-updates — a cut tag is frozen forever. Run via "Run workflow".
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Stable semver tag to cut (e.g. 1.0.0)"
        required: true
permissions:
  contents: write
jobs:
  build:
    runs-on: macos-14        # arm64 runner
    steps:
      - uses: actions/checkout@v4
      - name: Build from tracked upstream
        run: |
          set -euo pipefail
          CFG=ci/openssl-upstream.txt
          REPO="$(awk -F= '/^repo=/{print $2}' "$CFG" | tail -1)";   [ -n "$REPO" ]   || REPO="https://github.com/openssl/openssl.git"
          BRANCH="$(awk -F= '/^branch=/{print $2}' "$CFG" | tail -1)"; [ -n "$BRANCH" ] || BRANCH="openssl-3.6"
          tmp="$(mktemp -d)"; git clone --depth 1 --branch "$BRANCH" "$REPO" "$tmp/src"
          OPENSSL_SRC="$tmp/src" bash ci/build-openssl-apple.sh
      - name: Tag + release (locked forever)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          v="${{ github.event.inputs.version }}"
          git config user.name  "quiclane"
          git config user.email "quiclane@users.noreply.github.com"
          git checkout --orphan "stable-$v"
          git add -A
          git commit -q -m "stable $v (arm64 OpenSSL xcframework)"
          git tag "$v"
          git push origin "$v"
          gh release create "$v" OpenSSL.xcframework.zip --title "$v" --notes "Locked stable OpenSSL XCFramework (arm64: ios device/sim, macos)."
