name: openssl-dev-rolling
# Rolling DEV channel: at most every ~14 days, builds from upstream and cuts a
# NEW immutable semver tag in the 1.0.* line (1.0.1, 1.0.2, ...). Consumers use
# .upToNextMinor(from: "1.0.1") and always resolve the newest 1.0.N.
# The previous DEV release is deleted; the frozen stable 1.0.0 is NEVER touched.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 1,15 * *"   # 1st & 15th each month ≈ every ~14 days
permissions:
  contents: write
concurrency:
  group: openssl-dev
  cancel-in-progress: false
jobs:
  build:
    runs-on: macos-14        # Apple-silicon (arm64) runner
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0     # need tags for versioning

      - name: Gate (14-day + upstream change) and compute next 1.0.N
        id: gate
        run: |
          set -euo pipefail
          CFG=ci/openssl-upstream.txt
          REPO="$(awk -F= '/^repo=/{print $2}' "$CFG" | tail -1)";   [ -n "$REPO" ]   || REPO="https://github.com/openssl/openssl.git"
          BRANCH="$(awk -F= '/^branch=/{print $2}' "$CFG" | tail -1)"; [ -n "$BRANCH" ] || BRANCH="openssl-3.6"
          now="$(date +%s)"; last=0
          [ -f ci/last_success_epoch.txt ] && last="$(tr -dc 0-9 < ci/last_success_epoch.txt || echo 0)"
          age=$(( now - ${last:-0} ))
          tmp="$(mktemp -d)"; git clone --depth 1 --branch "$BRANCH" "$REPO" "$tmp/src"
          head="$(git -C "$tmp/src" rev-parse HEAD)"
          prev=""; [ -f ci/upstream_head.txt ] && prev="$(tr -d ' \r\n' < ci/upstream_head.txt || true)"
          should=1
          [ "$age" -lt 1209600 ] && should=0                  # < 14 days → skip
          [ -n "$prev" ] && [ "$head" = "$prev" ] && should=0 # no upstream change → skip
          git fetch --tags -q
          n="$(git tag -l '1.0.*' | sed 's/^1\.0\.//' | grep -E '^[0-9]+$' | sort -n | tail -1)"; [ -n "$n" ] || n=0
          next="1.0.$(( n + 1 ))"                             # 1.0.0 is frozen stable → dev starts at 1.0.1
          { echo "should=$should"; echo "head=$head"; echo "now=$now"; echo "src=$tmp/src"; echo "next=$next"; } >> "$GITHUB_OUTPUT"

      - name: Build xcframework
        if: steps.gate.outputs.should == '1'
        run: OPENSSL_SRC="${{ steps.gate.outputs.src }}" bash ci/build-openssl-apple.sh

      - name: Verify (4 slices incl. maccatalyst)
        if: steps.gate.outputs.should == '1'
        run: |
          set -euo pipefail
          test -f OpenSSL.xcframework.zip
          plutil -p OpenSSL.xcframework/Info.plist | grep -q ios-arm64-maccatalyst
          plutil -p OpenSSL.xcframework/Info.plist | grep -q macos-arm64

      - name: Write url-based Package.swift, commit, tag ${{ steps.gate.outputs.next }}
        if: steps.gate.outputs.should == '1'
        run: |
          set -euo pipefail
          V="${{ steps.gate.outputs.next }}"
          SUM="$(swift package compute-checksum OpenSSL.xcframework.zip)"
          bash ci/write-package-swift.sh "$V" "$SUM"
          git config user.name  "quiclane"
          git config user.email "quiclane@users.noreply.github.com"
          printf '%s\n' "${{ steps.gate.outputs.head }}" > ci/upstream_head.txt
          printf '%s\n' "${{ steps.gate.outputs.now }}"  > ci/last_success_epoch.txt
          git add Package.swift ci/upstream_head.txt ci/last_success_epoch.txt
          git commit -q -m "dev $V — OpenSSL $(date -u +%Y-%m-%d) (upstream ${{ steps.gate.outputs.head }})"
          git tag "$V"                     # immutable — never force
          git push origin HEAD:main
          git push origin "$V"

      - name: Publish ${{ steps.gate.outputs.next }} release; delete previous dev release
        if: steps.gate.outputs.should == '1'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          V="${{ steps.gate.outputs.next }}"
          gh release create "$V" OpenSSL.xcframework.zip \
            --title "dev $V" \
            --notes "Rolling dev (immutable tag). Consume: .upToNextMinor(from: \"1.0.1\"). Upstream ${{ steps.gate.outputs.head }}." \
            --prerelease
          # Delete previous DEV releases (prereleases) only — NEVER the frozen stable 1.0.0.
          for t in $(gh release list -L 100 --json tagName,isPrerelease -q '.[] | select(.isPrerelease==true) | .tagName' | grep -vx "$V" || true); do
            gh release delete "$t" -y || true
          done
